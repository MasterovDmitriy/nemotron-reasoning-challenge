# Main composition config — defines defaults pulled from subdirectories.
# Override anything via CLI: python script.py model=nemotron_super inference=greedy

defaults:
  - _self_
  - model: nemotron_nano
  - prompt: zero_shot
  - inference: greedy
  - data: small
  - experiment: null  # null by default, override with +experiment=baseline
  - override hydra/hydra_logging: default
  - override hydra/job_logging: default

# Project-wide settings
project:
  name: nemotron-reasoning
  seed: 42
  log_level: INFO

# Paths (relative to project root)
paths:
  root: ${oc.env:PROJECT_ROOT,${hydra:runtime.cwd}}
  data: ${paths.root}/data
  outputs: ${paths.root}/outputs
  models: ${paths.root}/models

# Experiment tracking
tracking:
  experiment_id: null  # auto-generated if null
  mlflow_uri: file:${paths.root}/mlruns
  mlflow_experiment: ${project.name}

# Hydra-specific config
hydra:
  run:
    dir: ${paths.outputs}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.outputs}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
